{% extends '_modal.html' %}
{% load django_bootstrap5 %}


{% block modal_title %}
    Brief
{% endblock %}
{% block modal_body %}
<form>
    {% bootstrap_field form.brief size='lg' show_label="skip" %}
    {% bootstrap_field form.keywords size='sm' show_label="skip" %}
<button class="btn btn-secondary float-end"
hx-post="{% url 'session_client:session_patch_brief' session.pk %}">Send</button>
</form>
{% endblock %}
