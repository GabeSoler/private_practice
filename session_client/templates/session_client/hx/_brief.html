{% extends '_modal.html' %}
{% load django_bootstrap5 %}


{% block modal_title %}
    Brief
{% endblock %}
{% block modal_body %}
<form>
    {% bootstrap_field form.keywords size='sm' show_label="skip" %}
<button class="btn btn-secondary float-end"
hx-post="{% url 'session_client:session_patch_brief' session.pk %}">Send</button>
</form>
{% if session.client.link %}
    <a href="{{ session.client.link }}" target="_blank">Client link <i class="bi bi-link-45deg"></i></a>
    {% endif %}
{% endblock %}
