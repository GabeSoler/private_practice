{% extends '_toast_content.html' %}


{% block content %}
    {% if created %}Created Sessions {% else %}Overlapping Sessions {% endif %}
    <ul>
        {% for session in sessions %}

            <li>
                {{ session.date }} - {{ session.time }} - {{ session.brief|truncatechars:10 }}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
