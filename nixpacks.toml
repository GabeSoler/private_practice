providers = ["...", "python"]

[variables]
NIXPACKS_PYTHON_PACKAGE_MANAGER = 'uv'
UV_PYTHON_DOWNLOADS = 'never'
UV_LINK_MODE = 'copy'
UV_PYTHON = "/opt/venv/bin/python"
NIXPACKS_UV_VERSION = "0.1.0"

[phases.setup]
nixPkgs = ["...", "uv"]

[phases.build]
cmds = ["...", ]

[start]
cmd = "uv run manage.py collectstatic --noinput && manage.py migrate && gunicorn ppm_app.wsgi"