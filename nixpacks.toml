[phases.setup]
nixPkgs = ["python3", "gcc"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install uv==0.5.11",
    ". /opt/venv/bin/activate && uv sync --no-dev --frozen"
]
paths = ["/opt/venv/bin"]



[start]
cmd = "uv run manage.py collectstatic --noinput && manage.py migrate && gunicorn ppm_app.wsgi"


[variables]
NIXPACKS_PYTHON_PACKAGE_MANAGER = 'uv'
UV_PYTHON_DOWNLOADS = 'never'
UV_LINK_MODE = 'copy'
UV_PYTHON = "/opt/venv/bin/python3"
