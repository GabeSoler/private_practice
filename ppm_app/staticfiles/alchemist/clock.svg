<svg id="animated-circle" width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<style type="text/css">
    <![CDATA[

    #animated-circle {
    animation: rotate 5s linear infinite;
  }
  
  @keyframes rotate {
    0% {
      transform: rotate(0deg);
      transform-origin: 0% 0%;
      stroke: blue;
    }
    50% {
      transform: rotate(360deg);
      transform-origin: 50% 50%;
      stroke:rgb(255, 127, 214);
    }
    100% {
      transform: rotate(360deg);
      transform-origin: 0% 0%;
      stroke:rgb(127, 255, 138);
    }
  }
    ]]>

    </style>

    <circle cx="50" cy="50" r="40" stroke="blue" stroke-width="4" fill="none" />
    <line x1="50" y1="50" x2="50" y2="10" stroke="blue" stroke-width="2" />
  
</svg>
