{% extends '../../_base.html' %}

{%block content%}
{% load django_bootstrap5 %}
  <h2>Add Session</h2>
  <a href={% url 'tools:session_list' %}>Back to Sessions</a></br>
  <a href={% url 'tools:add_client' %}>Add a Client First</a>

  {% endblock content %}
