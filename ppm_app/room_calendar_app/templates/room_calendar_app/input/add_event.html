{% extends '../../_base.html' %}

{%block content%}

{% load django_bootstrap5 %}
  <h2>Add Event</h2>
  <a href={% url 'room_calendar_app:event_list' %}>Back to Events</a></br>
  <a href={% url 'room_calendar_app:add_occurrence' %}>Add Occurrence</a>


  <form action="{% url 'room_calendar_app:add_event' %}" method='post'>
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_button button_type='submit' content='Add Event' %}
  </form>

  {% endblock content %}
