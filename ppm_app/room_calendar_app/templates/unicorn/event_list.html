<div>



    <ul>
        {% for event in events %} 
          <li>
            <a href="{% url 'room_calendar_app:event' event.pk %}"> | {{event.time}}</a> - {{event.tenant}} | {{event.date_added|date:'M d,Y H:i'}}
              <a class="list-item" href="{% url "room_calendar_app:occurrences" event.pk %}">Occurrences</a>
          </li>
          {% empty %}
          <li>There are no Events yet. </li>
        </ul>
</div>
