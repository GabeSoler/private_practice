{% extends '_modal.html' %}
{% block modal_title %}Profile:{{ tenant.name }}{% endblock modal_title %}

{% block modal_body %}
    <div class="card">
        <div class="card-body">
            <h5 class="card-title display-4">{{ tenant.name }}</h5>
            <p class="card-text">{{ tenant.description }}</p>
            <p class="card-text"><span class="bg-primary border" id="code">{{ tenant.pk }}</span>
                <button class="btn btn-outline-secondary"
                        _="on click
                    put innerHTML of previous <span/> into myText
                    writeText(myText) into the navigator's clipboard
                    end"
                >copy
                </button>
            </p>
            <p class="card-text small">Give the code to a Room Calendar controller to link it</p>
        </div>
    </div>




{% endblock modal_body %}
