{% extends '_base.html' %}

{% block content %}

<div class="card">
<div class="card-header">
  <h2 class="card-title">My Tenant Accounts</h2>
</div>
<div class="card-body">
  <ul class="list-group">
    {% for tenant in tenant_list %}
      <li class="list-group-item list-group-item-action list-group-item-primary">
        <a href="{% url 'room_calendar_app:tenant' tenant.pk %}">{{tenant.name}}</a> | {{tenant.description}}
      </li>
      {% empty %}
      <li class="list-group-item list-group-item-action list-group-item-primary">There are no tenants yet. </li>
      {% endfor %}
    </ul>
</div>
<div class="card-footer">
  <a class="card-link" href="{%url 'room_calendar_app:add_tenant'%}">Add new tenancy account</a>
  <a class="card-link" href="{%url 'room_calendar_app:week_view'%}">back to calendar</a>
</div>
  

</div>

  {% endblock content %}
