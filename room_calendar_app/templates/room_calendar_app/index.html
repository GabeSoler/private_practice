{% extends '../_base.html' %}

{% block content %}


<h2>My Events</h2>

<div class="card" id="event-list"> <!-- a list of events of user -->
  <ul class="list-group">
  {% for event in events %}
  <li class="list-group-item list-group-item-action list-group-item-{{event.color_class}}">
    <a href="{% url 'room_calendar_app:event' event.pk %}"> {{event.get_event_type_display}}| {{event.title}}</a>
  </li>
  {% endfor %}
  </ul>
</div><!-- end of list -->

<ul>
  <li><a href="{%url 'room_calendar_app:add_occurrence_multiple'%}">Add Multiple Occurrences</a></li>
</ul>


  {% endblock content %}
