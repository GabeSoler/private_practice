{% extends '_base.html' %}
{% load i18n %}

{% block local_nav %}
<!-- Sessions Nav -->
<nav
  class="nav mt-0 nav-tabs bg-secondary"
>
  <h4 class="text-primary m-2">{% translate 'Rooms' %}</h4>

  <a class="nav-link {% if request.path == "/calendar/room-calendar-list/"  %}active {% endif %}"
      href="{% url "room_calendar_app:room_calendar_list" %}" aria-current="page"
    >{% translate 'Spaces' %}</a
  >
  <a class="nav-link {% if request.path == "/calendar/profile-list/"  %}active {% endif %}"
      href="{% url "room_calendar_app:tenant_list" %}"
      >{% translate 'Rentals' %}</a>

    <a class="nav-link {% if request.path == "/calendar/room-calendar-manage/"  %}active {% endif %}"
      href={% url 'room_calendar_app:room_calendar_manage' %}
      >{% translate 'Manage' %}</a>

  <a class="nav-link {% if request.path == "/calendar/room-calendar-report/"  %}active{% endif %}"
    href="{% url "room_calendar_app:room_report" %}"
  >{% translate 'Report' %}</a>

  <a class="nav-link {% if request.path == "/add_client/"  %}active{% endif %}"
    href="{% url "room_calendar_app:add_room_calendar" %}"
        hx-get="{% url "room_calendar_app:add_room_calendar" %}"
       hx-target="#modal-wrapper"
  >{% translate 'Add' %}</a>

</nav>

  
  {% endblock local_nav %}

  <div id="content_wrap">
    {% block content %}

    {% endblock content %}
  </div>
