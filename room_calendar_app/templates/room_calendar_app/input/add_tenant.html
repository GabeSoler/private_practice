{% extends '../../_base.html' %}

{%block content%}

{% load django_bootstrap5 %}
  <h2>{{action}} Tenant</h2>
  <a href={% url 'room_calendar_app:tenant_list' %}>Back to Tenants</a></br>
  <a href={% url 'room_calendar_app:add_room_calendar' %}>Add Calendar</a>


  <form action="{% url 'room_calendar_app:add_tenant' %}" method='post'>
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_button button_type='submit' content='Add Tenant' %}
  </form>

  {% endblock content %}
