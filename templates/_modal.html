<!-- Modal -->
<div _="init call bootstrap.Modal.getOrCreateInstance(me).show()"
class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content bg-dark">
      <div class="modal-header bg-primary text-secondary">
        <h1 class="modal-title display-6" id="exampleModalLabel">{% block modal_title %}Modal title{% endblock %}</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        {% block modal_body %}Modal Body{% endblock %}
      </div>
      <div class="modal-footer">
        {% block modal_footer %}{% endblock %}
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
