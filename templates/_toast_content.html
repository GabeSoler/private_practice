<div class="toast-container position-fixed top-0 end-0" id="toast-content"
{% if oob %} hx-swap-oob="outerHTML:#toast-wrapper"{% endif %}>

    
    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" id="toastMessages"
    _="init call bootstrap.Toast.getOrCreateInstance(me).show()">
    <div class="d-flex">
        <div class="toast-body">
            <button type="button" class="btn-close position-fixed end-0 mx-2" data-bs-dismiss="toast" aria-label="Close"></button>
            {% block content %}
            {% endblock content %}
        </div>
    </div>
</div>

</div>
